<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width">
    <title>PaperSync</title>

    <style>
/* ================= SET UP ================= */
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #e0eafc;
    display: flex;
    flex-direction: column;
    height: 100vh; 
}

/* ================= NAVIGATION BAR ================= */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: white;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none; 
    color: #333;
}

/* ================= LOGIN CARD ================= */
.container {
    flex: 1; 
    display: flex;
    justify-content: center;
    align-items: center;    
}

.login-card {
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 300px;
}

/* ================= FORM STYLING ================= */
.form-group {
    margin-bottom: 15px;
}


input[type="checkbox"] {
    width: auto;
    padding: 0;     

    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;        
}

.btn-submit {
    width: 100%;
    padding: 10px;
    background-color: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">📚 PaperSync<i class="fa-solid fa-users"></i></div>
        <div class="user-actions">
            <button class="btn-login"><i class="fa-solid fa-house"></i>Login</button>
        </div>
    </header>

    <main class="container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login Your Student Account&#128511;</p>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-user"></i>Student ID / email</label>
                    <input type="text" id="email" placeholder="Enter your student ID or email" required>
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-pwd">Forgot Password？🤭</a>
                </div>

                <button type="submit" class="btn-submit">Login Now</button>
            </form>
        </div>
    </main>

<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/frontend";
        } else {
            alert("Invalid username or password");
        }
    });
});
</script>

</body>
</html>
