<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width">
    <title>PaperSync</title>

    <style>
/* ================= SET UP ================= */
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #e0eafc;
    display: flex;
    flex-direction: column;
    height: 100vh; 
}

/* ================= NAVIGATION BAR ================= */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: white;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none; 
    color: #333;
}

/* ================= LOGIN CARD ================= */
.container {
    flex: 1; 
    display: flex;
    justify-content: center;
    align-items: center;    
}

.login-card {
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 300px;
}

/* ================= FORM STYLING ================= */
.form-group {
    margin-bottom: 15px;
}


input[type="checkbox"] {
    width: auto;
    padding: 0;     

    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;        
}

.btn-submit {
    width: 100%;
    padding: 10px;
    background-color: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

input[type="text"], input[type="password"], input[type="email"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    box-sizing: border-box;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.9rem;
    color: #333;
}

/* ================= TABS ================= */
.auth-tabs {
    display: flex;
    margin-bottom: 18px;
    border-bottom: 1px solid #e5e7eb;
}

.auth-tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    color: #9ca3af;
    cursor: pointer;
    border-bottom: 2px solid transparent;
}

.auth-tab.active {
    color: #3498db;
    border-bottom-color: #3498db;
}

.auth-panel { display: none; }
.auth-panel.active { display: block; }

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    font-size: 0.85rem;
}

.forgot-pwd {
    color: #3498db;
    text-decoration: none;
    cursor: pointer;
}

/* ================= FORGOT PASSWORD MODAL ================= */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-overlay.show {
    display: flex;
}

.modal-card {
    background: white;
    padding: 26px;
    border-radius: 8px;
    width: 300px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.modal-card h3 {
    margin: 0 0 8px;
}

.modal-card p {
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 14px;
}

.modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
}

.btn-cancel {
    flex: 1;
    padding: 10px;
    background: #f3f4f6;
    color: #374151;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.modal-message {
    margin-top: 10px;
    font-size: 0.85rem;
    text-align: center;
}

.modal-message.error { color: #dc2626; }
.modal-message.success { color: #059669; }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">📚 PaperSync<i class="fa-solid fa-users"></i></div>
        <div class="user-actions">
            <button class="btn-login"><i class="fa-solid fa-house"></i>Login</button>
        </div>
    </header>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-card">
            <h3>Forgot Password</h3>
            <p>Enter your email and we'll send you a password reset link.</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="forgotEmail"><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeForgotModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Send Link</button>
                </div>
            </form>
            <div id="forgotMessage" class="modal-message"></div>
        </div>
    </div>

    <main class="container">
        <div class="login-card">

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" id="signupTab" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN PANEL -->
            <div class="auth-panel active" id="loginPanel">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login Your Student Account&#128511;</p>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email"><i class="fa-solid fa-user"></i> Student ID / email</label>
                        <input type="text" id="email" placeholder="Enter your student ID or email" required>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot-pwd" onclick="openForgotModal(event)">Forgot Password？🤭</a>
                    </div>

                    <button type="submit" class="btn-submit">Login Now</button>
                </form>
            </div>

            <!-- SIGN UP PANEL -->
            <div class="auth-panel" id="signupPanel">
                <h2>Create Account</h2>
                <p class="subtitle">Sign Up for PaperSync&#128218;</p>

                <form class="signup-form" id="signupForm">
                    <div class="form-group">
                        <label for="signupUsername"><i class="fa-solid fa-user"></i> Username</label>
                        <input type="text" id="signupUsername" placeholder="Choose a username" required>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail"><i class="fa-solid fa-envelope"></i> Email</label>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword"><i class="fa-solid fa-lock"></i> Password</label>
                        <input type="password" id="signupPassword" placeholder="Create a password" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="signupConfirmPassword"><i class="fa-solid fa-lock"></i> Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required minlength="6">
                    </div>

                    <button type="submit" class="btn-submit">Sign Up</button>
                </form>
                <div id="signupMessage" class="modal-message"></div>
            </div>

        </div>
    </main>

<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            sessionStorage.setItem("username", data.user.username);
            window.location.href = "/frontend";
        } else {
            alert(data.message || "Invalid username or password");
        }
    });
});

// ================= TAB SWITCHING =================
function switchAuthTab(tab) {
    document.getElementById("loginTab").classList.toggle("active", tab === "login");
    document.getElementById("signupTab").classList.toggle("active", tab === "signup");
    document.getElementById("loginPanel").classList.toggle("active", tab === "login");
    document.getElementById("signupPanel").classList.toggle("active", tab === "signup");
}

// ================= SIGN UP =================
document.getElementById("signupForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("signupUsername").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const confirmPassword = document.getElementById("signupConfirmPassword").value;
    const messageEl = document.getElementById("signupMessage");

    if (password !== confirmPassword) {
        messageEl.textContent = "Passwords do not match.";
        messageEl.className = "modal-message error";
        return;
    }

    fetch("/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, email, password })
    })
    .then(response => response.json())
    .then(data => {
        if (data.message === "Signup success") {
            messageEl.textContent = "Account created! You can now log in.";
            messageEl.className = "modal-message success";
            document.getElementById("signupForm").reset();
            setTimeout(() => switchAuthTab("login"), 1200);
        } else {
            messageEl.textContent = data.message || "Signup failed.";
            messageEl.className = "modal-message error";
        }
    })
    .catch(() => {
        messageEl.textContent = "Something went wrong. Please try again.";
        messageEl.className = "modal-message error";
    });
});

// ================= FORGOT PASSWORD =================
function openForgotModal(event) {
    event.preventDefault();
    document.getElementById("forgotModal").classList.add("show");
    document.getElementById("forgotMessage").textContent = "";
    document.getElementById("forgotMessage").className = "modal-message";
}

function closeForgotModal() {
    document.getElementById("forgotModal").classList.remove("show");
    document.getElementById("forgotForm").reset();
}

document.getElementById("forgotForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const email = document.getElementById("forgotEmail").value.trim();
    const messageEl = document.getElementById("forgotMessage");

    fetch("/forgot-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    })
    .then(response => response.json())
    .then(data => {
        messageEl.textContent = data.message;
        messageEl.className = data.success ? "modal-message success" : "modal-message error";
    })
    .catch(() => {
        messageEl.textContent = "Something went wrong. Please try again.";
        messageEl.className = "modal-message error";
    });
});
</script>

</body>
</html>
