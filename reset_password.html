<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>PaperSync - Reset Password</title>

    <style>
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #e0eafc;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: white;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 300px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.9rem;
    color: #333;
}

input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    box-sizing: border-box;
}

.btn-submit {
    width: 100%;
    padding: 10px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
}

.message {
    margin-top: 12px;
    font-size: 0.88rem;
    text-align: center;
}

.message.error { color: #dc2626; }
.message.success { color: #059669; }

.back-link {
    display: block;
    margin-top: 14px;
    text-align: center;
    font-size: 0.85rem;
    color: #3498db;
    text-decoration: none;
}
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">📚 PaperSync</div>
    </header>

    <main class="container">
        <div class="login-card">
            <h2>Reset Password</h2>
            <p style="font-size:0.88rem;color:#6b7280;margin-bottom:14px;">
                Enter a new password for your account.
            </p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword"><i class="fa-solid fa-lock"></i> New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fa-solid fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>

                <button type="submit" class="btn-submit">Reset Password</button>
            </form>

            <div id="message" class="message"></div>

            <a href="/" class="back-link">Back to Login</a>
        </div>
    </main>

<script>
function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

const token = getQueryParam("token");
const messageEl = document.getElementById("message");
const form = document.getElementById("resetForm");

if (!token) {
    messageEl.textContent = "Invalid or missing reset link.";
    messageEl.className = "message error";
    form.querySelector("button").disabled = true;
}

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
        messageEl.textContent = "Passwords do not match.";
        messageEl.className = "message error";
        return;
    }

    fetch("/reset-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ token: token, password: newPassword })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            messageEl.textContent = "Password reset successful! Redirecting to login...";
            messageEl.className = "message success";
            form.querySelector("button").disabled = true;
            setTimeout(() => { window.location.href = "/"; }, 2000);
        } else {
            messageEl.textContent = data.message || "Could not reset password.";
            messageEl.className = "message error";
        }
    })
    .catch(() => {
        messageEl.textContent = "Something went wrong. Please try again.";
        messageEl.className = "message error";
    });
});
</script>

</body>
</html>
