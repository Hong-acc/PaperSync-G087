<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaperSync Forum System</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #1e3a8a;
}

/* LOGIN STATUS */
#loginStatus {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  text-align: center;
  font-weight: bold;
  background: #e5e7eb;
  color: #6b7280;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  padding: 6px 10px;
  margin: 4px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.up { background: #22c55e; color: white; }
.down { background: #ef4444; color: white; }
.rep { background: #3b82f6; color: white; }

/* TAB UI */
.tab-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.tab-buttons button {
  flex: 1;
  padding: 10px;
  font-weight: bold;
}

.active-tab {
  background: #1e3a8a;
  color: white;
}

.inactive-tab {
  background: #e5e7eb;
}

/* VOTE UI */
.vote-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

.reply {
  margin-left: 20px;
  font-size: 13px;
  color: #555;
  border-left: 3px solid #ddd;
  padding-left: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 PaperSync Forum</h1>

<div id="loginStatus">Not logged in</div>

<!-- AUTH -->
<div class="card">

  <div class="tab-buttons">
    <button id="loginTab" class="active-tab" onclick="showLogin()">Login</button>
    <button id="signupTab" class="inactive-tab" onclick="showSignup()">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <input id="loginUser" placeholder="Username or Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" style="display:none;">
    <input id="signupUser" placeholder="Username">
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
  </div>

  <div id="authMsg"></div>
</div>

<!-- COMMENT -->
<div class="card">
  <h3>Post Comment</h3>
  <input id="paper" placeholder="Paper">
  <input id="comment" placeholder="Comment">
  <button onclick="addComment()">Submit</button>
</div>

<!-- FORUM -->
<div id="forumList"></div>

</div>

<script>

// ================= USER =================
function getUser() {
  const u = localStorage.getItem("user");
  if (!u || u === "undefined") return null;
  return u;
}

// ================= INIT =================
window.onload = function () {
  localStorage.removeItem("user");
  loginStatus.innerText = "Not logged in";
  loadComments();
};

// ================= TAB =================
function showLogin() {
  loginForm.style.display = "block";
  signupForm.style.display = "none";
  loginTab.className = "active-tab";
  signupTab.className = "inactive-tab";
}

function showSignup() {
  loginForm.style.display = "none";
  signupForm.style.display = "block";
  signupTab.className = "active-tab";
  loginTab.className = "inactive-tab";
}

// ================= SIGNUP =================
function signup() {
  fetch("/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: signupUser.value,
      email: signupEmail.value,
      password: signupPass.value
    })
  })
  .then(r => r.json())
  .then(d => authMsg.innerText = d.message);
}

// ================= LOGIN =================
function login() {
  fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: loginUser.value,
      password: loginPass.value
    })
  })
  .then(r => r.json())
  .then(data => {

    authMsg.innerText = data.message;

    if (data.success) {
      localStorage.setItem("user", data.user.username);
      loginStatus.innerText = "Logged in as " + data.user.username;
    }
  });
}

// ================= COMMENT =================
function addComment() {

  const user = getUser();
  if (!user) return alert("Please login first");

  fetch("/comment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user,
      paper: paper.value,
      text: comment.value
    })
  }).then(() => loadComments());
}

// ================= VOTE =================
function vote(id, action) {

  const user = getUser();
  if (!user) return alert("Please login first");

  fetch("/vote", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id, action, user })
  }).then(() => loadComments());
}

// ================= REPLY =================
function reply(id) {

  const user = getUser();
  if (!user) return alert("Please login first");

  const text = prompt("Reply:");
  if (!text) return;

  fetch("/reply", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id, user, text })
  }).then(() => loadComments());
}

// ================= LOAD COMMENTS =================
function loadComments() {

  fetch("/comments")
  .then(r => r.json())
  .then(data => {

    forumList.innerHTML = "";

    data.forEach(c => {

      const up = Object.values(c.voters || {}).filter(v => v === "upvote").length;
      const down = Object.values(c.voters || {}).filter(v => v === "downvote").length;

      let replies = "";
      (c.replies || []).forEach(r => {
        replies += `<div class="reply">↳ <b>${r.user}</b>: ${r.text}</div>`;
      });

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${c.user}</b> • ${c.paper}<br>
        ${c.text}<br>

        <div class="vote-row">
          👍 ${up} <button class="up">Upvote</button>
          👎 ${down} <button class="down">Downvote</button>
        </div>

        <button class="rep" onclick="reply('${c.id}')">Reply</button>

        <div>${replies}</div>
      `;

      div.querySelector(".up").onclick = () => vote(c.id, "upvote");
      div.querySelector(".down").onclick = () => vote(c.id, "downvote");

      forumList.appendChild(div);
    });
  });
}

</script>

</body>
</html>
