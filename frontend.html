<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaperSync Forum System</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  color: #1e3a8a;
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 LOGIN STATUS BAR */
#loginStatus {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  text-align: center;
  font-weight: bold;
  background: #e5e7eb;
  color: #6b7280;
  transition: 0.3s;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  padding: 6px 10px;
  margin: 4px 4px 0 0;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.up { background: #22c55e; color: white; }
.down { background: #ef4444; color: white; }
.rep { background: #3b82f6; color: white; }

.reply {
  margin-left: 20px;
  font-size: 13px;
  color: #555;
  border-left: 3px solid #ddd;
  padding-left: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 PaperSync Forum</h1>

<!-- 🔥 LOGIN STATUS -->
<div id="loginStatus">
  Not logged in
</div>

<!-- LOGIN -->
<div class="card">
  <h2>Login System</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginEmail" placeholder="Email (signup only)">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <div id="authMsg"></div>
</div>

<!-- SEARCH -->
<div class="card">
  <h2>Search Papers</h2>
  <input id="searchBox" placeholder="Search paper"/>
  <button onclick="searchPaper()">Search</button>
  <pre id="searchResult"></pre>
</div>

<!-- COMMENT -->
<div class="card">
  <h2>Post Comment</h2>
  <input id="user" placeholder="User"/>
  <input id="paper" placeholder="Paper"/>
  <input id="comment" placeholder="Comment"/>
  <button onclick="addComment()">Submit</button>
</div>

<!-- FORUM -->
<div class="card">
  <h2>Forum</h2>
  <div id="forumList"></div>
</div>

</div>

<script>

// ================= SIGNUP =================
function signup() {

  if (!loginUser.value.trim() || !loginEmail.value.trim() || !loginPass.value.trim()) {
    authMsg.innerText = "Please fill in all fields";
    return;
  }

  fetch("/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: loginUser.value,
      email: loginEmail.value,
      password: loginPass.value
    })
  })
  .then(r => r.json())
  .then(data => {
    authMsg.innerText = data.message || "Error";
  });
}

// ================= LOGIN (UPGRADED UI) =================
function login() {

  if (!loginUser.value.trim() || !loginPass.value.trim()) {
    authMsg.innerText = "Please fill in all fields";
    return;
  }

  fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: loginUser.value,
      password: loginPass.value
    })
  })
  .then(r => r.json())
  .then(data => {

    if (data.success && data.user) {

      // save session
      localStorage.setItem("user", data.user.username);
      localStorage.setItem("user_id", data.user.user_id);

      user.value = data.user.username;

      // success message
      authMsg.innerText = "Login successful 🎉";

      // 🔥 BIG UI FEEDBACK
      const status = document.getElementById("loginStatus");

      status.innerHTML = `
        ✅ Logged in as <b>${data.user.username}</b>
        <br>
        Role: ${data.user.role}
      `;

      status.style.background = "#dcfce7";
      status.style.color = "#166534";

    } else {

      authMsg.innerText = data.message || "Login failed";

      const status = document.getElementById("loginStatus");
      status.innerHTML = "❌ Not logged in";
      status.style.background = "#fee2e2";
      status.style.color = "#991b1b";
    }
  })
  .catch(() => {
    authMsg.innerText = "Server error";
  });
}

// ================= SEARCH =================
function searchPaper() {
  fetch('/search?q=' + searchBox.value)
  .then(r => r.json())
  .then(data => {
    searchResult.innerText = JSON.stringify(data, null, 2);
  });
}

// ================= COMMENT =================
function addComment() {
  fetch("/comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      user: localStorage.getItem("user") || user.value,
      paper: paper.value,
      text: comment.value
    })
  }).then(() => loadComments());
}

// ================= LOAD COMMENTS =================
function loadComments() {
  fetch("/comments")
  .then(r => r.json())
  .then(data => {

    const forum = document.getElementById("forumList");
    forum.innerHTML = "";

    data.forEach(c => {

      let replies = "";
      (c.replies || []).forEach(r => {
        replies += `<div class="reply">↳ <b>${r.user}</b>: ${r.text}</div>`;
      });

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${c.user}</b> • ${c.paper}<br>
        ${c.text}<br><br>

        👍 Votes: ${c.votes || 0}<br>

        <button class="up">👍 Upvote</button>
        <button class="down">👎 Downvote</button>
        <button class="rep">💬 Reply</button>

        <div>${replies}</div>
      `;

      div.querySelector(".up").onclick = () => vote(c.id, "upvote");
      div.querySelector(".down").onclick = () => vote(c.id, "downvote");
      div.querySelector(".rep").onclick = () => reply(c.id);

      forum.appendChild(div);
    });
  });
}

// ================= VOTE =================
function vote(id, action) {
  fetch("/vote", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      id,
      action,
      user: localStorage.getItem("user") || "guest"
    })
  }).then(() => loadComments());
}

// ================= REPLY =================
function reply(id) {
  let text = prompt("Reply:");
  if (!text) return;

  fetch("/reply", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      id,
      user: localStorage.getItem("user") || "anonymous",
      text
    })
  }).then(() => loadComments());
}

window.onload = loadComments;

</script>

</body>
</html>
