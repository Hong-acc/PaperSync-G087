<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width">
    <title>Student Peer Support Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">📚 Student Peer Support Platform</div>
        <div class="user-actions">
            <button class="btn-login"><i class="fa-solid fa-house"></i>Login</button>
        </div>
    </header>

    <main class="container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login Your Student Account&#128511;</p>

            <!-- ❗ FIX 1: remove form submit redirect -->
            <form class="login-form" onsubmit="return false;">
                
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-user"></i>Student ID / email</label>
                    <input type="text" id="email" placeholder="Enter your student ID or email">
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-pwd">Forgot Password？🤭</a>
                </div>

                <!-- ❗ FIX 2: prevent default submit -->
                <button type="button" class="btn-submit" onclick="login()">Login Now</button>

            </form>
        </div>
    </main>

<script>
function login() {

    const username = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // ❗ FIX 3: block empty login
    if (!username || !password) {
        alert("Please enter username and password");
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            // store session
            localStorage.setItem("user", data.user.username);

            // redirect ONLY after success
            window.location.href = "/home";

        } else {
            alert("Login failed: " + data.message);
        }
    })
    .catch(err => {
        alert("Server error");
        console.error(err);
    });
}
</script>

</body>
</html>
